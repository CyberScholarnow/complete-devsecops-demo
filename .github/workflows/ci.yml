name: devsecops-free-ci

on:
  push:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  build_test_package:
    name: 1) Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run unit tests
        run: pytest -q
      - name: Package app artifact
        run: |
          zip -r app_artifact.zip app.py requirements.txt Dockerfile
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app_artifact
          path: app_artifact.zip

  sast:
    name: 2) SAST (Semgrep OSS)
    runs-on: ubuntu-latest
    needs: build_test_package
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep (auto rules)
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"
          generateSarif: true
          uploadSarif: false
      - name: Fail on Medium/High findings only
        run: |
          # semgrep-action exits nonzero on any finding; instead parse SARIF or use severity filter.
          # Simpler: rerun with severity filter and ignore low.
          pip install semgrep
          semgrep scan --config p/ci --error --severity WARNING

  sca:
    name: 3) SCA (Trivy for deps & SBOM)
    runs-on: ubuntu-latest
    needs: build_test_package

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@0.24.0
      with:
        scan-type: "fs"
        format: "table"
        exit-code: "1"
        ignore-unfixed: true
        severity: "HIGH,CRITICAL"

    - name: Generate SBOM (CycloneDX)
      uses: CycloneDX/gh-python-cyclonedx@v1
      with:
        fileName: "bom.xml"

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: bom.xml

  secrets:
    name: 4) Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest
    needs: build_test_package
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-git -v --redact --exit-code 1

  iac:
    name: 5) IaC Scan (Checkov)
    runs-on: ubuntu-latest
    needs: build_test_package
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: ""
          output_format: cli

  container_scan:
    name: 6) Container Build & Scan (Trivy image)
    runs-on: ubuntu-latest
    needs: [build_test_package]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t demoimage:ci .
      - name: Trivy image scan (fail on HIGH+)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "demoimage:ci"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"

  dast:
    name: 7) DAST (OWASP ZAP baseline)
    runs-on: ubuntu-latest
    needs: [build_test_package]
    steps:
      - uses: actions/checkout@v4
      - name: Start app (background)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          nohup python app.py > server.log 2>&1 &
          sleep 3
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8000/hello"
          cmd_options: "-a -m 1"
          artifact_name: "zapscan"   # ← THIS FIXES THE ERROR
      # Baseline doesn’t fail hard by default; add threshold if you want:
      # - name: Fail on Medium alerts
      #   run: test ! -f report_json.json || jq '.site[].alerts[] | select(.risk=="Medium" or .risk=="High")' report_json.json | grep . && exit 1 || true

  policy_gate:
    name: 8) Policy & Compliance Gate (OPA/Conftest)
    runs-on: ubuntu-latest
    needs: [container_scan]
    steps:
      - uses: actions/checkout@v4
      - name: Install Conftest
        run: |
          curl -L https://github.com/open-policy-agent/conftest/releases/download/v0.53.0/conftest_0.53.0_Linux_x86_64.tar.gz \
          | tar xz && sudo mv conftest /usr/local/bin/
      - name: Evaluate Dockerfile policy
        run: conftest test -p policy Dockerfile


  deploy:
    name: 9) “Deploy” to a GitHub Release (free)
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, iac, container_scan, dast, policy_gate]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app_artifact
          path: .
      - name: Create GitHub Release on main only
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CI artifact v${{ github.run_number }}"
          files: app_artifact.zip
