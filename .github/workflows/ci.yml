name: devsecops-free-ci

on:
  push:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  build_test_package:
    name: 1) Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run unit tests
        run: pytest -q
      - name: Package app artifact
        run: |
          zip -r app_artifact.zip app.py requirements.txt Dockerfile
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app_artifact
          path: app_artifact.zip

  sast:
    name: 2) SAST (Semgrep OSS)
    runs-on: ubuntu-latest
    needs: build_test_package
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep (auto rules)
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"
          generateSarif: true
          uploadSarif: false
      - name: Fail on Medium/High findings only
        run: |
          # semgrep-action exits nonzero on any finding; instead parse SARIF or use severity filter.
          # Simpler: rerun with severity filter and ignore low.
          pip install semgrep
          semgrep scan --config p/ci --error --severity WARNING
    
  sbom:
    name: 3) SBOM Generation (Syft)
    runs-on: ubuntu-latest
    needs: build_test_package
    steps:
      - uses: actions/checkout@v6
  
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin
  
      - name: Generate SBOM (CycloneDX JSON)
        run: syft . -o cyclonedx-json > sbom.json
  
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json        
          
  secrets:
    name: 4) Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest
    needs: build_test_package
    steps:
      - uses: actions/checkout@v6
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-git -v --redact --exit-code 1

  iac:
    name: 5) IaC Scan (Checkov)
    runs-on: ubuntu-latest
    needs: build_test_package
    steps:
      - uses: actions/checkout@v6
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: ""
          output_format: cli

  container_scan:
    name: 6) Container Build & Scan (Trivy image)
    runs-on: ubuntu-latest
    needs: [build_test_package]
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t demoimage:ci .
      - name: Trivy image scan (fail on HIGH+)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "demoimage:ci"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"

  dast:
    name: 7) DAST (ZAP Full Scan Docker)
    runs-on: ubuntu-latest
    needs: build_test_package
  
    steps:
      - uses: actions/checkout@v6
  
      - name: Start App (background)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          nohup python app.py > server.log 2>&1 &
          sleep 5
  
      - name: Pull ZAP Docker Image
        run: docker pull zaproxy/zap-stable
  
      - name: Run ZAP Full Scan
        run: |
          docker run --network="host" \
            -u root \
            -v $(pwd):/zap/wrk \
            zaproxy/zap-stable zap-full-scan.py \
            -t http://localhost:8000/hello \
            -g gen.conf \
            -r zap_report.html \
            -z "-config api.disablekey=true" || true
  
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html

  policy_gate:
    name: 8) Policy & Compliance Gate (OPA/Conftest)
    runs-on: ubuntu-latest
    needs: [container_scan]
    steps:
      - uses: actions/checkout@v6
      - name: Install Conftest
        run: |
          curl -L https://github.com/open-policy-agent/conftest/releases/download/v0.53.0/conftest_0.53.0_Linux_x86_64.tar.gz \
          | tar xz && sudo mv conftest /usr/local/bin/
      - name: Evaluate Dockerfile policy
        run: conftest test -p policy Dockerfile
    
  deploy:
    name: 9) “Deploy” to a GitHub Release (free)
    runs-on: ubuntu-latest
    needs: [sast, sbom, secrets, iac, container_scan, policy_gate, dast]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app_artifact
          path: .
      - name: Create GitHub Release on main only
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CI artifact v${{ github.run_number }}"
          files: app_artifact.zip
